<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep Agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    header p { font-size: 14px; color: #666; }

    .card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }

    textarea {
      width: 100%;
      min-height: 160px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
      color: #1a1a1a;
    }
    textarea:focus { outline: none; border-color: #999; }

    .btn {
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      border: 0.5px solid #ccc;
      background: #fff;
      color: #1a1a1a;
      transition: background 0.15s;
    }
    .btn:hover { background: #f5f5f0; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    .row { display: flex; gap: 10px; align-items: center; margin-top: 1rem; flex-wrap: wrap; }

    .step { display: none; }
    .step.active { display: block; }

    .loading-bar { height: 3px; background: #eee; border-radius: 99px; overflow: hidden; margin: 1rem 0; }
    .loading-fill { height: 100%; width: 0%; background: #1a1a1a; border-radius: 99px; transition: width 0.4s ease; }

    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .tab {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      border: 0.5px solid #ddd;
      background: #f5f5f0;
      color: #666;
    }
    .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .count-badge { font-size: 11px; margin-left: 4px; opacity: 0.7; }

    .q-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .badge-purple { background: #EEEDFE; color: #3C3489; }
    .badge-teal   { background: #E1F5EE; color: #085041; }
    .badge-amber  { background: #FAEEDA; color: #633806; }
    .badge-coral  { background: #FAECE7; color: #712B13; }
    .badge-blue   { background: #E6F1FB; color: #0C447C; }

    .q-num { font-size: 12px; color: #999; }
    .q-text { font-size: 15px; color: #1a1a1a; line-height: 1.6; margin-bottom: 0.75rem; }
    .q-hint { font-size: 13px; color: #666; line-height: 1.5; }
    .q-hint strong { font-size: 12px; font-weight: 500; color: #999; }

    .error-text { font-size: 13px; color: #A32D2D; }

    .practice-bar {
      margin-top: 1.5rem;
      border-top: 0.5px solid #ddd;
      padding-top: 1rem;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    p.sub { font-size: 14px; color: #666; margin-bottom: 1.25rem; line-height: 1.6; }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .card, .q-card { background: #242424; border-color: #333; }
      textarea { background: #2a2a2a; color: #f0f0f0; border-color: #333; }
      .btn { background: #242424; color: #f0f0f0; border-color: #444; }
      .btn:hover { background: #2a2a2a; }
      .btn-primary { background: #f0f0f0; color: #1a1a1a; border-color: #f0f0f0; }
      .tab { background: #2a2a2a; color: #999; border-color: #333; }
      .tab.active { background: #f0f0f0; color: #1a1a1a; }
      .loading-bar { background: #333; }
      .loading-fill { background: #f0f0f0; }
      .practice-bar { border-color: #333; }
      header p, p.sub, label, .q-hint, .q-num { color: #999; }
      .q-text { color: #f0f0f0; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Interview prep agent</h1>
    <p>Paste your resume and a job description to generate tailored interview questions.</p>
  </header>

  <!-- Step 1: Input -->
  <div id="step1" class="step active">
    <div class="card">
      <label>Your resume</label>
      <textarea id="resume" placeholder="Paste your full resume text here..."></textarea>
    </div>
    <div class="card">
      <label>Job description</label>
      <textarea id="jobdesc" placeholder="Paste the full job posting here..."></textarea>
    </div>
    <div class="row">
      <button class="btn btn-primary" onclick="generate()">Generate questions &nbsp;→</button>
      <span id="err1" class="error-text"></span>
    </div>
  </div>

  <!-- Step 2: Loading -->
  <div id="step2" class="step">
    <div class="card">
      <h2>Generating your questions…</h2>
      <p class="sub" id="load-status">Analyzing resume and job description…</p>
      <div class="loading-bar"><div class="loading-fill" id="load-bar"></div></div>
    </div>
  </div>

  <!-- Step 3: Results -->
  <div id="step3" class="step">
    <div class="top-row">
      <div>
        <h2 id="role-title">Interview questions</h2>
        <p class="sub" style="margin-bottom:0;" id="role-sub"></p>
      </div>
      <button class="btn btn-sm" onclick="reset()">
        <i class="ti ti-refresh"></i> New job
      </button>
    </div>
    <div class="tabs" id="tab-bar"></div>
    <div id="questions-container"></div>
    <div class="practice-bar">
      <p style="font-size:13px; color:#666; width:100%; margin-bottom:4px;">Want to practice? Copy a question and paste it into Claude.ai to do a live mock interview.</p>
      <button class="btn btn-sm" onclick="copyAll()">
        <i class="ti ti-copy"></i> Copy all questions
      </button>
      <button class="btn btn-sm" onclick="reset()">
        <i class="ti ti-arrow-left"></i> Start over
      </button>
    </div>
  </div>

</div>

<script>
  const WORKER_URL = 'https://quiet-math-bbf4.scottymay93.workers.dev';

  let allQuestions = {};
  let activeTab = '';

  const categoryMeta = {
    'Behavioral':       { badge: 'badge-purple', icon: 'ti-user' },
    'Technical':        { badge: 'badge-blue',   icon: 'ti-code' },
    'Experience gaps':  { badge: 'badge-coral',  icon: 'ti-alert-triangle' },
    'Role fit':         { badge: 'badge-teal',   icon: 'ti-target' },
    'Situational':      { badge: 'badge-amber',  icon: 'ti-bulb' },
  };

  function setStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
  }

  async function generate() {
    const resume  = document.getElementById('resume').value.trim();
    const job     = document.getElementById('jobdesc').value.trim();
    const errEl   = document.getElementById('err1');
    if (!resume) { errEl.textContent = 'Please paste your resume.'; return; }
    if (!job)    { errEl.textContent = 'Please paste the job description.'; return; }
    errEl.textContent = '';
    setStep(2);

    const bar    = document.getElementById('load-bar');
    const status = document.getElementById('load-status');
    let pct = 0;
    const tick = setInterval(() => { pct = Math.min(pct + 2, 85); bar.style.width = pct + '%'; }, 400);

    const msgs = [
      [2000,  'Identifying key requirements…'],
      [5000,  'Comparing against your background…'],
      [9000,  'Flagging experience gaps…'],
      [13000, 'Drafting behavioral questions…'],
    ];
    msgs.forEach(([ms, msg]) => setTimeout(() => { status.textContent = msg; }, ms));

    const prompt = `You are a senior hiring manager and interview coach. Analyze the resume and job description below, then generate interview questions a real hiring panel would likely ask.

Return ONLY a JSON object (no markdown, no explanation) with this structure:
{
  "role": "Job title from the posting",
  "company": "Company name if visible, else empty string",
  "categories": {
    "Behavioral": [
      {"question": "...", "hint": "What the interviewer is really assessing here"}
    ],
    "Technical": [],
    "Experience gaps": [],
    "Role fit": [],
    "Situational": []
  }
}

Rules:
- 3 questions per category
- Experience gaps: questions about skills in the job description absent or thin in the resume
- Behavioral: STAR-format questions based on key responsibilities
- Technical: specific to tools and skills in the job description
- Situational: hypothetical workplace scenarios relevant to this role
- Role fit: career trajectory, motivation, cultural fit
- Hints should be 1 sentence, specific and actionable

RESUME:
${resume}

JOB DESCRIPTION:
${job}`;

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 8000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      clearInterval(tick);
      bar.style.width = '100%';

      const data  = await res.json();
      const raw   = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      allQuestions = parsed.categories || {};
      const keys   = Object.keys(allQuestions);
      activeTab    = keys[0] || '';

      document.getElementById('role-title').textContent = parsed.role || 'Interview questions';
      document.getElementById('role-sub').textContent   = parsed.company || '';

      buildTabs(keys);
      renderQuestions(activeTab);
      setStep(3);

    } catch (e) {
      clearInterval(tick);
      setStep(1);
      document.getElementById('err1').textContent = 'Error generating questions. Please try again.';
      console.error(e);
    }
  }

  function buildTabs(keys) {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    keys.forEach(k => {
      const count = (allQuestions[k] || []).length;
      const btn   = document.createElement('button');
      btn.className = 'tab' + (k === activeTab ? ' active' : '');
      btn.innerHTML = k + `<span class="count-badge">${count}</span>`;
      btn.onclick   = () => { activeTab = k; buildTabs(keys); renderQuestions(k); };
      bar.appendChild(btn);
    });
  }

  function renderQuestions(cat) {
    const container = document.getElementById('questions-container');
    const qs   = allQuestions[cat] || [];
    const meta = categoryMeta[cat] || { badge: 'badge-purple', icon: 'ti-help' };
    container.innerHTML = qs.map((q, i) => `
      <div class="q-card">
        <div class="q-header">
          <span class="badge ${meta.badge}">
            <i class="ti ${meta.icon}" style="font-size:11px; margin-right:4px;"></i>${cat}
          </span>
          <span class="q-num">Q${i + 1}</span>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="q-hint"><strong>What they're assessing:</strong> ${q.hint}</div>
      </div>
    `).join('');
  }

  function copyAll() {
    const lines = [];
    Object.entries(allQuestions).forEach(([cat, qs]) => {
      lines.push(`\n== ${cat} ==`);
      qs.forEach((q, i) => lines.push(`Q${i+1}: ${q.question}\n   → ${q.hint}`));
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const btn = document.querySelector('.practice-bar .btn-sm');
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
      setTimeout(() => { btn.innerHTML = orig; }, 2000);
    });
  }

  function reset() {
    document.getElementById('resume').value  = '';
    document.getElementById('jobdesc').value = '';
    document.getElementById('err1').textContent = '';
    setStep(1);
  }
</script>
</body>
</html>
